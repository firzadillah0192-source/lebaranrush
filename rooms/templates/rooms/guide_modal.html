<div x-data="gameGuide" @open-guide.window="isOpen = true" x-cloak>
    <!-- Help Button moved to header -->

    <!-- Modal Overlay -->
    <div x-show="isOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-[110] flex items-center justify-center p-4 md:p-8 bg-black/90 backdrop-blur-md">

        <!-- Modal Content -->
        <div @click.away="isOpen = false" @keydown.escape.window="isOpen = false"
            class="bg-slate-950 border border-white/10 w-full max-w-2xl max-h-[90vh] rounded-[40px] overflow-hidden flex flex-col shadow-[0_0_50px_rgba(0,0,0,0.5)] animate-pop-in relative">

            <!-- Close button for mobile -->
            <button @click="isOpen = false"
                class="absolute top-6 right-6 text-slate-500 hover:text-white md:hidden z-20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Header -->
            <div
                class="px-8 py-8 border-b border-white/5 flex flex-col md:flex-row md:items-center justify-between gap-6 bg-gradient-to-b from-white/5 to-transparent">
                <div class="flex items-center gap-5">
                    <div
                        class="w-14 h-14 rounded-2xl bg-gradient-to-br from-lebaran-400 to-lebaran-600 flex items-center justify-center text-3xl shadow-lg shadow-lebaran-500/20">
                        📖</div>
                    <div>
                        <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white"
                            x-text="t('guide_title')"></h2>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-lebaran-500 animate-pulse"></span>
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]"
                                x-text="t('guide_subtitle')"></p>
                        </div>
                    </div>
                </div>

                <!-- Language Toggle (Quick switch inside modal too) -->
                <div class="flex bg-black/60 p-1.5 rounded-2xl border border-white/10 self-start md:self-center">
                    <button @click="$store.config.setLang('en')"
                        :class="$store.config.lang === 'en' ? 'bg-lebaran-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'"
                        class="px-5 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all">ENGLISH</button>
                    <button @click="$store.config.setLang('id')"
                        :class="$store.config.lang === 'id' ? 'bg-lebaran-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'"
                        class="px-5 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all">INDONESIA</button>
                </div>
            </div>

            <!-- Scrollable Body -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-8 pt-4 space-y-12">
                <!-- Overview -->
                <section class="relative">
                    <div
                        class="absolute -left-4 top-0 bottom-0 w-1 bg-gradient-to-b from-lebaran-500 to-transparent rounded-full opacity-50">
                    </div>
                    <h3
                        class="text-lebaran-400 font-black uppercase tracking-[0.2em] text-xs mb-4 flex items-center gap-2">
                        <span class="text-lg">✨</span> <span x-text="t('sec_overview')"></span>
                    </h3>
                    <p class="text-slate-300 leading-relaxed text-sm font-medium" x-text="t('overview_text')"></p>
                </section>

                <!-- How to Join -->
                <section>
                    <h3
                        class="text-blue-400 font-black uppercase tracking-[0.2em] text-xs mb-6 flex items-center gap-2">
                        <span class="text-lg">📲</span> <span x-text="t('sec_join')"></span>
                    </h3>
                    <div class="grid gap-4">
                        <template x-for="(step, idx) in t('join_steps')">
                            <div class="flex gap-4 p-4 rounded-2xl bg-blue-500/5 border border-blue-500/10">
                                <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-black text-xs shrink-0"
                                    x-text="idx + 1"></div>
                                <span class="text-slate-300 text-sm font-medium" x-text="step"></span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Gacha Rules -->
                <section>
                    <h3
                        class="text-purple-400 font-black uppercase tracking-[0.2em] text-xs mb-6 flex items-center gap-2 text-glow-purple">
                        <span class="text-lg">🎁</span> <span x-text="t('sec_gacha')"></span>
                    </h3>
                    <div class="space-y-4">
                        <template x-for="rule in t('gacha_rules')">
                            <div class="flex gap-4 items-start group">
                                <div
                                    class="w-1.5 h-1.5 rounded-full bg-purple-500 mt-2 shrink-0 group-hover:translate-x-1 transition-all">
                                </div>
                                <span class="text-slate-300 text-sm leading-relaxed" x-text="rule"></span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Undercover Rules -->
                <section>
                    <h3 class="text-red-400 font-black uppercase tracking-[0.2em] text-xs mb-6 flex items-center gap-2">
                        <span class="text-lg">🎭</span> <span x-text="t('sec_undercover')"></span>
                    </h3>
                    <div
                        class="bg-gradient-to-br from-red-500/10 to-transparent rounded-[32px] p-6 border border-red-500/10 relative overflow-hidden">
                        <div class="absolute -right-8 -bottom-8 text-8xl opacity-5 pointer-events-none rotate-12">🎭
                        </div>
                        <div class="space-y-4 relative z-10">
                            <template x-for="rule in t('undercover_rules')">
                                <div class="flex gap-4 items-start">
                                    <div class="text-red-400 font-black text-lg">›</div>
                                    <span class="text-slate-300 text-sm leading-relaxed" x-text="rule"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </section>

                <!-- Spin Wheel -->
                <section>
                    <h3
                        class="text-yellow-500 font-black uppercase tracking-[0.2em] text-xs mb-6 flex items-center gap-2">
                        <span class="text-lg">🎡</span> <span x-text="t('sec_wheel')"></span>
                    </h3>
                    <div class="bg-yellow-500/5 p-6 rounded-[32px] border border-yellow-500/10 mb-6 text-center">
                        <p class="text-slate-300 text-sm italic font-medium" x-text="t('wheel_text')"></p>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <template x-for="reward in t('wheel_rewards')">
                            <div
                                class="bg-black/40 border border-white/5 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-yellow-500/30 transition-colors group">
                                <span class="text-3xl group-hover:animate-bounce" x-text="reward.icon"></span>
                                <span class="text-[9px] font-black uppercase text-slate-500 text-center tracking-widest"
                                    x-text="reward.label"></span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Power Ups -->
                <section>
                    <h3
                        class="text-orange-400 font-black uppercase tracking-[0.2em] text-xs mb-6 flex items-center gap-2">
                        <span class="text-lg">⚡</span> <span x-text="t('sec_powerups')"></span>
                    </h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <template x-for="pw in t('powerups_list')">
                            <div
                                class="p-5 rounded-3xl bg-white/[0.03] border border-white/5 flex gap-4 hover:bg-white/[0.05] transition-all">
                                <div class="w-12 h-12 rounded-2xl bg-slate-900 border border-white/10 flex items-center justify-center text-2xl shrink-0 shadow-inner"
                                    x-text="pw.icon"></div>
                                <div>
                                    <div class="font-black text-white uppercase text-xs mb-1 tracking-tight"
                                        x-text="pw.name"></div>
                                    <div class="text-[11px] text-slate-400 leading-relaxed font-medium"
                                        x-text="pw.desc"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Winning Conditions -->
                <section class="pb-8">
                    <h3
                        class="text-emerald-400 font-black uppercase tracking-[0.2em] text-xs mb-6 flex items-center gap-2">
                        <span class="text-lg">🏆</span> <span x-text="t('sec_winning')"></span>
                    </h3>
                    <div
                        class="bg-gradient-to-br from-emerald-600 to-teal-700 p-8 rounded-[40px] border border-white/10 text-center shadow-2xl shadow-emerald-500/20 relative overflow-hidden group">
                        <div
                            class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 pointer-events-none">
                        </div>
                        <div
                            class="absolute top-0 left-0 w-full h-full bg-gradient-to-t from-black/20 to-transparent pointer-events-none">
                        </div>
                        <div
                            class="text-5xl mb-6 drop-shadow-2xl group-hover:scale-110 transition-transform duration-500">
                            👑</div>
                        <p class="text-white font-black italic text-xl uppercase tracking-tighter leading-tight relative z-10"
                            x-text="t('winning_text')"></p>
                    </div>
                </section>
            </div>

            <!-- Footer -->
            <div class="px-8 py-8 border-t border-white/5 bg-black/60 flex justify-center">
                <button @click="isOpen = false"
                    class="bg-white text-black font-black py-4 px-12 rounded-2xl text-[10px] uppercase tracking-[0.2em] transition-all shadow-xl hover:scale-105 active:scale-95">
                    <span x-text="t('close')"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .text-glow-purple {
        text-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
    }
</style>

<script>
    document.addEventListener('alpine:init', () => {
        // Prevent re-initialization
        if (Alpine.store('gameGuideStore')) return;
        Alpine.store('gameGuideStore', true);

        Alpine.data('gameGuide', () => ({
            isOpen: false,
            translations: {
                en: {
                    guide_title: "Lebaran Rush Guide",
                    guide_subtitle: "How to play & Master the rush",
                    sec_overview: "Game Overview",
                    overview_text: "Lebaran Rush is a high-stakes party game experience where players compete in various challenges to collect massive points and spin tickets. Outsmart your friends, survive the eliminations, and claim the championship trophy!",
                    sec_join: "Getting Started",
                    join_steps: [
                        "Enter the 5-character Room Code shown on the host TV screen.",
                        "Choose a unique nickname that will appear on the leaderboard.",
                        "Wait in the lobby until the Host initiates the first game round."
                    ],
                    sec_gacha: "Gacha Game Rules",
                    gacha_rules: [
                        "A grid of mystery boxes is displayed. Each contains a secret reward or a trap.",
                        "The 'Reveal Phase' is critical: memorize as many box contents as possible before they hide!",
                        "After boxes are shuffled, take turns picking one. You'll find Points, Spins, or Power-Ups.",
                        "Watch out for the Zonk! If you pick one without a Shield, you are immediately eliminated from the round."
                    ],
                    sec_undercover: "Undercover Game Rules",
                    undercover_rules: [
                        "One player is secretly assigned as the Spy. Everyone else is a Civilian.",
                        "Civilians receive a common word; the Spy gets a similar but distinct word.",
                        "Describe your word cleverly—be vague enough to hide if you're the Spy, but clear enough to prove you're a Civilian.",
                        "After the discussion, vote to eliminate the person you trust least.",
                        "Civilians win if the Spy is caught. Spy wins if they survive until the end."
                    ],
                    sec_wheel: "The Fortune Wheel",
                    wheel_text: "The Spin Wheel is your path to a comeback. Earn spin tickets by winning mini-games or exchange your banked points for tickets.",
                    wheel_rewards: [
                        { icon: "🪙", label: "Massive Points" },
                        { icon: "🎡", label: "Bonus Spins" },
                        { icon: "🕵️", label: "Global Steal" },
                        { icon: "🛡️", label: "Golden Shield" }
                    ],
                    sec_powerups: "Power-Ups & Tactics",
                    powerups_list: [
                        { icon: "🛡️", name: "Safety Shield", desc: "Passive protection that automatically saves you from a single Zonk elimination." },
                        { icon: "🔄", name: "Point Swap", desc: "Select any player to instantly trade your point balance with theirs. Use it strategically!" },
                        { icon: "🕵️", name: "Secret Steal", desc: "Target a leader and siphon off a significant portion of their points for yourself." },
                        { icon: "✖️", name: "Double Rush", desc: "A multiplier that doubles all points gained during the very next round." }
                    ],
                    sec_winning: "Winning the Rush",
                    winning_text: "Survival is key, but points are king. The player with the highest total score after all game modes are completed wins the tournament!",
                    close: "LFG! Start Playing",
                },
                id: {
                    guide_title: "Panduan Lebaran Rush",
                    guide_subtitle: "Cara bermain & Kuasai permainan",
                    sec_overview: "Ringkasan Permainan",
                    overview_text: "Lebaran Rush adalah pengalaman permainan pesta berisiko tinggi di mana pemain bersaing dalam berbagai tantangan untuk mengumpulkan poin besar dan tiket spin. Adu strategi dengan temanmu, bertahan dari eliminasi, dan raih trofi juara!",
                    sec_join: "Mari Memulai",
                    join_steps: [
                        "Masukkan 5 karakter Kode Ruangan yang tertera di layar TV host.",
                        "Pilih nama panggilan unik yang akan muncul di papan peringkat.",
                        "Tunggu di lobi sampai Host memulai ronde permainan pertama."
                    ],
                    sec_gacha: "Aturan Main Gacha",
                    gacha_rules: [
                        "Grid kotak misteri ditampilkan. Masing-masing berisi hadiah rahasia atau jebakan.",
                        "Fase 'Reveal' sangat krusial: hafalkan isi kotak sebanyak mungkin sebelum mereka bersembunyi!",
                        "Setelah kotak diacak, pilih satu secara bergantian. Kamu bisa menemukan Poin, Spin, atau Power-Up.",
                        "Waspada terhadap Zonk! Jika memilih Zonk tanpa Shield, kamu langsung tereliminasi dari ronde tersebut."
                    ],
                    sec_undercover: "Aturan main Undercover",
                    undercover_rules: [
                        "Satu pemain diam-diam ditunjuk sebagai Mata-mata (Spy). Sisanya adalah Warga Sipil.",
                        "Warga menerima satu kata umum; Mata-mata menerima kata yang serupa tapi berbeda.",
                        "Jelaskan katamu dengan cerdik—cukup samarkan agar tidak ketahuan jika kamu Spy, tapi cukup jelas untuk membuktikan kamu Warga.",
                        "Setelah diskusi, voting untuk mengeliminasi orang yang paling tidak kamu percayai.",
                        "Warga menang jika Spy tertangkap. Spy menang jika mereka bertahan hingga akhir."
                    ],
                    sec_wheel: "Roda Keberuntungan",
                    wheel_text: "Spin Wheel adalah jalurmu untuk bangkit. Dapatkan tiket spin dengan memenangkan mini-game atau tukarkan poinmu dengan tiket.",
                    wheel_rewards: [
                        { icon: "🪙", label: "Poin Masif" },
                        { icon: "🎡", label: "Bonus Spin" },
                        { icon: "🕵️", label: "Pencurian Global" },
                        { icon: "🛡️", label: "Perisai Emas" }
                    ],
                    sec_powerups: "Power-Up & Taktik",
                    powerups_list: [
                        { icon: "🛡️", name: "Safety Shield", desc: "Perlindungan pasif yang secara otomatis menyelamatkanmu dari satu eliminasi Zonk." },
                        { icon: "🔄", name: "Point Swap", desc: "Pilih pemain mana pun untuk langsung menukar saldo poinmu dengan mereka. Gunakan secara strategis!" },
                        { icon: "🕵️", name: "Secret Steal", desc: "Targetkan pemimpin skor dan sedot sebagian besar poin mereka untuk dirimu sendiri." },
                        { icon: "✖️", name: "Double Rush", desc: "Pengganda yang melipatgandakan semua poin yang didapat selama ronde berikutnya." }
                    ],
                    sec_winning: "Memenangkan Rush",
                    winning_text: "Bertahan hidup itu penting, tapi poin adalah segalanya. Pemain dengan total skor tertinggi setelah semua mode selesai adalah juaranya!",
                    close: "GAS! Ayo Main",
                }
            },
            t(key) {
                const lang = Alpine.store('config').lang;
                return this.translations[lang][key];
            }
        }));
    });
</script>
