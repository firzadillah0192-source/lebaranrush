{% extends "base.html" %}

{% block content %}
<div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border border-lebaran-100">
    <h1 class="text-3xl font-bold text-lebaran-900 mb-2">Join Room: {{ room.code }}</h1>
    <p class="text-lebaran-600 mb-8">Enter your name to join the fun!</p>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <input type="text" name="name" placeholder="Your Name" required
                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-lebaran-500 focus:ring-2 focus:ring-lebaran-200 outline-none transition-all text-center font-bold text-lg">
        </div>

        <button type="submit"
            class="w-full bg-lebaran-500 hover:bg-lebaran-600 text-white font-bold py-4 px-6 rounded-xl transition-all transform hover:scale-105 shadow-md">
            Join Game
        </button>
    </form>
</div>
{% endblock %}
