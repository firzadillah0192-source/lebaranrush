<div x-data="hostGuide" @open-host-guide.window="openGuide($event.detail)" x-cloak>
    <!-- Modal Overlay -->
    <div x-show="isOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-[120] flex items-center justify-center p-4 md:p-8 bg-black/90 backdrop-blur-md">

        <!-- Modal Content -->
        <div @click.away="isOpen = false" @keydown.escape.window="isOpen = false"
            class="bg-slate-950 border border-white/10 w-full max-w-3xl max-h-[90vh] rounded-[40px] overflow-hidden flex flex-col shadow-[0_0_60px_rgba(0,0,0,0.8)] animate-pop-in relative">

            <!-- Header -->
            <div
                class="px-8 py-8 border-b border-white/5 bg-gradient-to-b from-white/5 to-transparent flex justify-between items-center">
                <div class="flex items-center gap-5">
                    <div
                        class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-400 to-indigo-600 flex items-center justify-center text-3xl shadow-lg shadow-blue-500/20">
                        🎓</div>
                    <div>
                        <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white"
                            x-text="t('guide_title')"></h2>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]"
                            x-text="t('guide_subtitle')"></p>
                    </div>
                </div>
                <button @click="isOpen = false" class="text-slate-500 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Scrollable Body -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-12">
                <!-- TV Display Instruction -->
                <section
                    class="bg-blue-600/10 border border-blue-500/20 p-8 rounded-[35px] relative overflow-hidden group">
                    <div
                        class="absolute -right-4 -bottom-4 text-9xl opacity-[0.03] group-hover:scale-110 transition-transform duration-700">
                        📺</div>
                    <div class="flex items-start gap-6 relative z-10">
                        <div class="text-4xl shrink-0">📺</div>
                        <div>
                            <h3 class="text-blue-400 font-black uppercase tracking-widest text-sm mb-2"
                                x-text="t('display_title')"></h3>
                            <p class="text-slate-300 text-base leading-relaxed font-medium" x-html="t('display_desc')">
                            </p>
                        </div>
                    </div>
                </section>

                <!-- Navigation Tabs -->
                <div class="flex flex-wrap gap-2 border-b border-white/5 pb-4">
                    <template x-for="tab in tabs">
                        <button @click="activeTab = tab.id"
                            :class="activeTab === tab.id ? 'bg-white text-black shadow-lg shadow-white/10' : 'text-slate-500 hover:text-slate-300 bg-white/5'"
                            class="px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest transition-all uppercase"
                            x-text="t(`tab_${tab.id}`)"></button>
                    </template>
                </div>

                <!-- Tab Content -->
                <div x-show="activeTab === 'general'" class="animate-pop-in">
                    <h3 class="text-indigo-400 font-black uppercase tracking-widest text-xs mb-6"
                        x-text="t('sec_general')"></h3>
                    <div class="space-y-6">
                        <div class="flex gap-6 group">
                            <div
                                class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-xl shrink-0 border border-white/10 group-hover:border-indigo-500/50 transition-colors">
                                🎮</div>
                            <div>
                                <h4 class="text-white font-black text-xs uppercase mb-1" x-text="t('gen_start_title')">
                                </h4>
                                <p class="text-slate-400 text-xs leading-relaxed" x-text="t('gen_start_desc')"></p>
                            </div>
                        </div>
                        <div class="flex gap-6 group">
                            <div
                                class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-xl shrink-0 border border-white/10 group-hover:border-indigo-500/50 transition-colors">
                                🔄</div>
                            <div>
                                <h4 class="text-white font-black text-xs uppercase mb-1" x-text="t('gen_sync_title')">
                                </h4>
                                <p class="text-slate-400 text-xs leading-relaxed" x-text="t('gen_sync_desc')"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'gacha'" class="animate-pop-in">
                    <h3 class="text-purple-400 font-black uppercase tracking-widest text-xs mb-6"
                        x-text="t('sec_gacha')"></h3>
                    <div class="space-y-6">
                        <div class="grid md:grid-cols-2 gap-4">
                            <div class="p-5 rounded-3xl bg-white/5 border border-white/10">
                                <h4 class="text-white font-black text-[10px] uppercase mb-3 text-purple-400"
                                    x-text="t('gacha_types_title')"></h4>
                                <ul class="space-y-2 text-[10px] text-slate-400 font-bold uppercase tracking-tight">
                                    <li x-text="t('gacha_item_snack')"></li>
                                    <li x-text="t('gacha_item_zonk')"></li>
                                    <li x-text="t('gacha_item_shield')"></li>
                                    <li x-text="t('gacha_item_tactical')"></li>
                                </ul>
                            </div>
                            <div class="p-5 rounded-3xl bg-white/5 border border-white/10">
                                <h4 class="text-white font-black text-[10px] uppercase mb-3 text-purple-400"
                                    x-text="t('gacha_rounds_title')"></h4>
                                <p class="text-xs text-slate-400 leading-relaxed italic"
                                    x-text="t('gacha_rounds_desc')"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'undercover'" class="animate-pop-in">
                    <h3 class="text-red-400 font-black uppercase tracking-widest text-xs mb-6"
                        x-text="t('sec_undercover')"></h3>
                    <div class="space-y-6">
                        <div class="p-6 rounded-[35px] bg-red-600/5 border border-red-500/10">
                            <p class="text-slate-300 text-sm leading-relaxed mb-4" x-text="t('und_intro')"></p>
                            <div class="space-y-4">
                                <div class="flex items-center gap-4 text-xs font-black text-white italic">
                                    <span class="text-red-400">1.</span> <span x-text="t('und_step1')"></span>
                                </div>
                                <div class="flex items-center gap-4 text-xs font-black text-white italic">
                                    <span class="text-red-400">2.</span> <span x-text="t('und_step2')"></span>
                                </div>
                                <div class="flex items-center gap-4 text-xs font-black text-white italic">
                                    <span class="text-red-400">3.</span> <span x-text="t('und_step3')"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'spin'" class="animate-pop-in">
                    <h3 class="text-yellow-500 font-black uppercase tracking-widest text-xs mb-6"
                        x-text="t('sec_spin')"></h3>
                    <div class="space-y-6">
                        <div class="flex gap-6">
                            <div
                                class="w-12 h-12 rounded-2xl bg-yellow-500/10 border border-yellow-500/20 flex items-center justify-center text-3xl">
                                🎛️</div>
                            <div>
                                <h4 class="text-white font-black text-xs uppercase mb-1"
                                    x-text="t('spin_config_title')"></h4>
                                <p class="text-slate-400 text-xs leading-relaxed" x-text="t('spin_config_desc')"></p>
                            </div>
                        </div>
                        <div class="flex gap-6">
                            <div
                                class="w-12 h-12 rounded-2xl bg-yellow-500/10 border border-yellow-500/20 flex items-center justify-center text-3xl">
                                👥</div>
                            <div>
                                <h4 class="text-white font-black text-xs uppercase mb-1" x-text="t('spin_queue_title')">
                                </h4>
                                <p class="text-slate-400 text-xs leading-relaxed" x-text="t('spin_queue_desc')"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-8 py-8 border-t border-white/5 bg-black/60 flex justify-center">
                <button @click="isOpen = false"
                    class="bg-blue-600 text-white font-black py-4 px-12 rounded-2xl text-[10px] uppercase tracking-[0.2em] transition-all shadow-xl hover:bg-blue-500 active:scale-95">
                    <span x-text="t('close')"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('hostGuide', () => ({
            isOpen: false,
            activeTab: 'general',
            tabs: [
                { id: 'general', name: 'General' },
                { id: 'gacha', name: 'Gacha' },
                { id: 'undercover', name: 'Undercover' },
                { id: 'spin', name: 'Spin Wheel' }
            ],
            translations: {
                en: {
                    guide_title: "Host Tutorial",
                    guide_subtitle: "Mastering the Rush Control",
                    display_title: "Display Mode",
                    display_desc: "<strong class=\"text-white\">CRITICAL:</strong> This screen should be displayed on a <span class=\"text-blue-400\">TV or Large Monitor</span> using an HDMI cable or Screen Casting. Players will watch this screen for game results, while they interact using their phones.",
                    tab_general: "General",
                    tab_gacha: "Gacha",
                    tab_undercover: "Undercover",
                    tab_spin: "Spin Wheel",
                    sec_general: "General Hosting",
                    gen_start_title: "Starting the Game",
                    gen_start_desc: "Wait for players to join in the Lobby. Once everyone is in, click the \"Gacha Setup\" button in the sidebar to configure the first game.",
                    gen_sync_title: "Syncing State",
                    gen_sync_desc: "If a player's phone seems stuck or shows the wrong state, use the \"Sync All Players\" button in the sidebar. This forces all connected phones to refresh their game state.",
                    sec_gacha: "Gacha Setup Guide",
                    gacha_types_title: "Box Types",
                    gacha_item_snack: "🍿 Snack: Reward players with real snacks!",
                    gacha_item_zonk: "💀 ZONK: Eliminates the player (unless they have a Shield).",
                    gacha_item_shield: "🛡️ Shield: Protects from a future Zonk.",
                    gacha_item_tactical: "🕵️ Steal/Swap: Tactical point stealing abilities.",
                    gacha_rounds_title: "Rounds",
                    gacha_rounds_desc: "You can setup multiple rounds at once. Each round should generally have fewer boxes as players are eliminated.",
                    sec_undercover: "Undercover Management",
                    und_intro: "Undercover is a game of social deduction. Your job as a host is to keep the discussion moving.",
                    und_step1: "Roles are assigned automatically.",
                    und_step2: "Discussion is turn-based. Wait for the active player to finish speaking.",
                    und_step3: "If discussion takes too long, click \"Force Voting\" to end the phase.",
                    sec_spin: "Spin Wheel Config",
                    spin_config_title: "Configuration",
                    spin_config_desc: "Customize the wheel segments. You can set point rewards, \"Spin Again\" slots, or even \"Jackpot\". Don't forget to \"Activate\" the wheel.",
                    spin_queue_title: "The Queue",
                    spin_queue_desc: "Players appear in the queue as they request spins from their phones. They must spend points to get a ticket.",
                    close: "Got it, Let's Host!"
                },
                id: {
                    guide_title: "Tutorial Host",
                    guide_subtitle: "Kuasai Kontrol Permainan",
                    display_title: "Mode Tampilan",
                    display_desc: "<strong class=\"text-white\">PENTING:</strong> Layar ini harus ditampilkan di <span class=\"text-blue-400\">TV atau Monitor Besar</span> menggunakan kabel HDMI atau Screen Casting. Pemain akan melihat layar ini untuk hasil game, sementara mereka bermain lewat HP.",
                    tab_general: "Umum",
                    tab_gacha: "Gacha",
                    tab_undercover: "Undercover",
                    tab_spin: "Roda Spin",
                    sec_general: "Hosting Umum",
                    gen_start_title: "Memulai Permainan",
                    gen_start_desc: "Tunggu pemain bergabung di Lobi. Setelah semua masuk, klik tombol \"Gacha Setup\" di sidebar untuk mengatur permainan pertama.",
                    gen_sync_title: "Sinkronisasi State",
                    gen_sync_desc: "Jika HP pemain macet atau salah tampilan, gunakan tombol \"Sync All Players\". Ini memaksa semua HP pemain untuk menyegarkan state game mereka.",
                    sec_gacha: "Panduan Gacha",
                    gacha_types_title: "Tipe Kotak",
                    gacha_item_snack: "🍿 Snack: Hadiahi pemain dengan snack asli!",
                    gacha_item_zonk: "💀 ZONK: Mengeliminasi pemain (kecuali punya Shield).",
                    gacha_item_shield: "🛡️ Shield: Melindungi dari Zonk di masa depan.",
                    gacha_item_tactical: "🕵️ Steal/Swap: Kemampuan taktis mencuri poin.",
                    gacha_rounds_title: "Ronde",
                    gacha_rounds_desc: "Kamu bisa mengatur beberapa ronde sekaligus. Ronde selanjutnya biasanya punya kotak lebih sedikit.",
                    sec_undercover: "Manajemen Undercover",
                    und_intro: "Undercover adalah game deduksi sosial. Tugas host adalah menjaga diskusi tetap berjalan.",
                    und_step1: "Peran ditentukan secara otomatis.",
                    und_step2: "Diskusi berbasis giliran. Tunggu pemain aktif selesai bicara.",
                    und_step3: "Jika diskusi terlalu lama, klik \"Force Voting\" untuk mengakhiri fase.",
                    sec_spin: "Konfigurasi Roda Spin",
                    spin_config_title: "Konfigurasi",
                    spin_config_desc: "Sesuaikan segmen roda. Bisa set hadiah poin, slot \"Spin Lagi\", atau \"Jackpot\". Jangan lupa \"Aktifkan\" roda.",
                    spin_queue_title: "Antrean",
                    spin_queue_desc: "Pemain muncul di antrean saat mereka meminta spin dari HP masing-masing. Mereka harus menukar poin dengan tiket.",
                    close: "Siap, Mari Bermain!"
                }
            },
            t(key) {
                const lang = Alpine.store('config')?.lang || 'en';
                return this.translations[lang][key] || key;
            },
            openGuide(tabId) {
                if (tabId && this.tabs.find(t => t.id === tabId)) {
                    this.activeTab = tabId;
                } else {
                    this.activeTab = 'general';
                }
                this.isOpen = true;
            }
        }));
    });
</script>
