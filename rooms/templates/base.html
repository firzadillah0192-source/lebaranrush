{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lebaran Rush</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lebaran: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- AlpineJS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        html {
            font-size: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }

        .h-view {
            height: 100vh;
            height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }

        .min-h-view {
            min-height: 100vh;
            min-height: 100dvh;
        }

        .box-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            justify-content: center;
            gap: 0.75vh;
            width: 100%;
            max-width: min(72vh, 800px);
            margin: 0 auto;
        }

        .game-panel {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            padding-bottom: 2vh;
        }

        .box {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 17vh;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .round-title {
            font-size: clamp(18px, 4vh, 32px) !important;
            line-height: 1.0;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow: hidden;
            min-height: 0;
        }

        .grid-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0;
            padding: 20px;
            gap: 20px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .shadow-text {
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        [x-cloak] {
            display: none !important;
        }

        /* Standard header style */
        .stage-title {
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: -0.05em;
            line-height: 0.9;
        }

        @keyframes popIn {
            0% {
                transform: translateY(10px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .eid-bg-overlay {
            background-image: url("{% static 'images/eid_bg.png' %}");
        }

        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('config', {
                lang: localStorage.getItem('game_lang') || 'en',
                setLang(l) {
                    this.lang = l;
                    localStorage.setItem('game_lang', l);
                    // Dispatch event for components that need to react specifically
                    window.dispatchEvent(new CustomEvent('lang-changed', { detail: l }));
                }
            });
        });
    </script>
    <script>
        // Disable pinch zoom and Ctrl +/- zoom
        window.addEventListener('wheel', function (e) {
            if (e.ctrlKey) { e.preventDefault(); }
        }, { passive: false });
        window.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (e.key === '=' || e.key === '-' || e.key === '0')) {
                e.preventDefault();
            }
        });
    </script>
</head>

<body class="h-view w-screen text-slate-200 overflow-hidden pb-safe">
    <main class="h-full w-full flex flex-col overflow-hidden">
        {% include 'rooms/guide_modal.html' %}
        {% block content %}{% endblock %}
    </main>

    <div x-data="helpBubble()" x-init="init()" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <div x-show="open" x-cloak 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-90 translate-y-4"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-90 translate-y-4"
             class="mb-4 w-72 max-w-[85vw] bg-slate-900/98 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-4 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            
            <div class="flex justify-between items-start mb-3">
                <p class="font-bold text-emerald-400 text-base leading-tight" x-text="greeting"></p>
                <button @click="open = false" class="p-1 text-slate-500 hover:text-slate-300 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <template x-if="selectedAnswer">
                <div class="mb-3 text-xs text-slate-300 bg-emerald-500/10 border border-emerald-500/20 p-3 rounded-xl relative animate-pop-in">
                    <button @click="selectedAnswer = ''" class="absolute top-1 right-1 text-slate-500 hover:text-emerald-400 p-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <div class="pr-4 font-medium" x-text="selectedAnswer"></div>
                </div>
            </template>

            <div class="space-y-1.5 mb-4 max-h-48 overflow-y-auto custom-scrollbar pr-1">
                <template x-for="option in options" :key="option.id">
                    <button class="w-full text-left text-xs px-3 py-2.5 rounded-lg bg-slate-800/50 hover:bg-slate-700 border border-slate-700/50 hover:border-emerald-500/30 transition-all duration-200 group flex justify-between items-center" 
                            @click="selectedAnswer = option.answer">
                        <span x-text="option.title"></span>
                        <svg class="w-3 h-3 text-slate-600 group-hover:text-emerald-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </template>
            </div>

            <div class="border-t border-slate-800 pt-3 text-[10px] text-slate-400">
                <div class="space-y-1.5">
                    <template x-for="contact in contacts" :key="contact.name + contact.value">
                        <div class="flex justify-between items-center bg-slate-800/30 px-2 py-1.5 rounded-lg">
                            <span class="text-slate-500 font-bold uppercase tracking-tighter" x-text="contact.name"></span>
                            <span class="font-mono text-emerald-400/90" x-text="contact.value"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <button @click="open = !open" 
                class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 w-12 h-12 rounded-full shadow-[0_10px_30px_rgba(16,185,129,0.3)] flex items-center justify-center transform active:scale-90 transition-all duration-300 group overflow-hidden">
            <span x-show="!open" class="text-xl group-hover:scale-110 transition-transform duration-300">💬</span>
            <svg x-show="open" class="w-6 h-6 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>
    </div>

    <script>
        function helpBubble() {
            return {
                open: false,
                bubbleLabel: 'Butuh bantuan?',
                greeting: 'Halo! Ada yang bisa kami bantu?',
                options: [],
                contacts: [],
                selectedAnswer: '',
                async init() {
                    try {
                        const res = await fetch('/helpbot/data/');
                        if (!res.ok) return;
                        const data = await res.json();
                        this.bubbleLabel = data.bubble_label || this.bubbleLabel;
                        this.greeting = data.greeting || this.greeting;
                        this.options = data.options || [];
                        this.contacts = data.contacts || [];
                    } catch (e) {
                        console.error('Help bubble unavailable', e);
                    }
                }
            }
        }
    </script>

</body>

</html>
